schemaVersion: 1
title: "Command History"
when: "commandHistoryOpen"
blocks:
  commandHistoryShell:
    title: "Command History Shell"
    builder:
      category: "panel"
      editable: true
    defaults:
      visible: true
      style:
        position: "fixed"
        left: "50%"
        top: "10%"
        width: "min(760px, calc(100vw - 24px))"
        zIndex: 3400
    layout:
      id: "blocks/commandHistoryShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "command-history-root"
  use: "commandHistoryShell"
  builder:
    editable: true
  children:
    - id: "command-history-panel"
      type: "CommandHistoryPicker"
      props:
        visible: true
        resizable: true
        resizeAxis: "both"
      builder:
        editable: true
