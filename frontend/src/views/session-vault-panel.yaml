schemaVersion: 1
title: "Session Vault"
when: "sessionVaultOpen"
blocks:
  sessionVaultPanelShell:
    title: "Session Vault Panel Shell"
    builder:
      category: "panel"
      editable: true
    defaults:
      visible: true
      style:
        position: "fixed"
        top: 88
        right: 10
        width: 420
        zIndex: 3300
    layout:
      id: "blocks/sessionVaultPanelShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "session-vault-root"
  use: "sessionVaultPanelShell"
  builder:
    editable: true
  children:
    - id: "session-vault-panel"
      type: "SessionVaultPanel"
      props:
        visible: true
        resizable: true
        resizeAxis: "both"
      builder:
        editable: true
