schemaVersion: 1
title: "Agent Chat"
when: "agentPanelOpen"
blocks:
  dockedAgentPanelShell:
    title: "Docked Agent Panel Shell"
    builder:
      category: "panel"
      editable: true
    defaults:
      visible: true
      resizable: true
      resizeAxis: "horizontal"
      minWidth: 280
      maxWidth: "80vw"
      style:
        width: 440
        maxWidth: 820
        display: "flex"
        flexDirection: "column"
        position: "relative"
        flexShrink: 0
        height: "100%"
        minHeight: 0
        minWidth: 280
        overflow: "hidden"
    layout:
      id: "blocks/dockedAgentPanelShell/layout"
      type: "AgentChatDockShell"
      builder:
        editable: true
  dockedAgentPanelFrame:
    title: "Docked Agent Panel Frame"
    builder:
      category: "panel"
      editable: true
    defaults:
      visible: true
      style:
        width: "100%"
        minWidth: 0
        height: "100%"
        display: "flex"
        flexDirection: "column"
        flex: 1
        background: "var(--bg-primary)"
        border: "1px solid var(--border)"
        borderRadius: "var(--radius-xl)"
        overflow: "hidden"
    layout:
      id: "blocks/dockedAgentPanelFrame/layout"
      use: "amux-primitive-column"
      builder:
        editable: true
        droppable: true
  dockedAgentPanelBody:
    title: "Docked Agent Panel Body"
    builder:
      category: "panel"
      editable: true
    defaults:
      visible: true
      style:
        flex: 1
        overflow: "hidden"
        position: "relative"
        display: "flex"
        flexDirection: "column"
    layout:
      id: "blocks/dockedAgentPanelBody/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
        droppable: true
layout:
  id: "agent-chat-root"
  use: "dockedAgentPanelShell"
  builder:
    editable: true
  children:
    - id: "agent-chat-provider"
      type: "AgentChatPanelProvider"
      props:
        style:
          display: "flex"
          flexDirection: "column"
          height: "100%"
          minHeight: 0
      builder:
        editable: true
      children:
        - id: "agent-chat-frame"
          use: "dockedAgentPanelFrame"
          builder:
            editable: true
          children:
            - id: "agent-chat-header"
              type: "AgentChatPanelHeader"
              builder:
                editable: true
            - id: "agent-chat-tabs"
              type: "AgentChatPanelTabs"
              builder:
                editable: true
            - id: "agent-chat-body"
              use: "dockedAgentPanelBody"
              builder:
                editable: true
              children:
                - id: "agent-chat-current-surface"
                  type: "AgentChatPanelCurrentSurface"
                  props:
                    style:
                      display: "flex"
                      flexDirection: "column"
                      flex: 1
                      minHeight: 0
                      height: "100%"
                  builder:
                    editable: true
