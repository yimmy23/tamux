schemaVersion: 1
title: "Command Log"
when: "commandLogOpen"
blocks:
  commandLogPanelShell:
    title: "Command Log Panel Shell"
    builder:
      category: "panel"
      editable: true
    defaults:
      visible: true
      style:
        position: "fixed"
        bottom: 46
        right: 10
        width: "min(680px, calc(100vw - 20px))"
        zIndex: 3300
    layout:
      id: "blocks/commandLogPanelShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "command-log-root"
  use: "commandLogPanelShell"
  builder:
    editable: true
  children:
    - id: "command-log-panel"
      type: "CommandLogPanel"
      props:
        visible: true
        resizable: true
        resizeAxis: "both"
      builder:
        editable: true
