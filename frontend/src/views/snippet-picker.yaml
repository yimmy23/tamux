schemaVersion: 1
title: "Snippet Picker"
when: "snippetPickerOpen"
blocks:
  snippetPickerShell:
    title: "Snippet Picker Shell"
    builder:
      category: "panel"
      editable: true
    defaults:
      visible: true
      style:
        position: "fixed"
        left: "50%"
        top: "9%"
        width: "min(920px, calc(100vw - 24px))"
        zIndex: 3400
    layout:
      id: "blocks/snippetPickerShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "snippet-picker-root"
  use: "snippetPickerShell"
  builder:
    editable: true
  children:
    - id: "snippet-picker-panel"
      type: "SnippetPicker"
      props:
        visible: true
        resizable: true
        resizeAxis: "both"
      builder:
        editable: true
