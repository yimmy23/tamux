schemaVersion: 1
title: "Main Dashboard"
blocks:
  shellColumn:
    title: "Shell Column"
    builder:
      category: "layout"
      editable: true
    defaults:
      visible: true
      style:
        flex: 1
        minHeight: 0
        gap: 0
        padding: 0
    layout:
      use: "amux-primitive-column"
  workspaceStage:
    title: "Workspace Stage"
    builder:
      category: "layout"
      editable: true
    defaults:
      visible: true
      style:
        flex: 1
        alignItems: "stretch"
        overflow: "hidden"
        gap: 0
        minHeight: 0
    layout:
      use: "amux-primitive-row"
  workspaceFrame:
    title: "Workspace Frame"
    builder:
      category: "layout"
      editable: true
    defaults:
      visible: true
      className: "amux-shell-card"
      style:
        flex: 1
        display: "flex"
        flexDirection: "column"
        overflow: "hidden"
        position: "relative"
    layout:
      use: "amux-primitive-box"
layout:
  id: "dashboard-root"
  use: "amux-primitive-column"
  props:
    visible: true
    style:
      width: "100%"
      height: "100%"
      background: "var(--bg-void)"
      overflow: "hidden"
  children:
    - id: "runtime-bridge"
      type: "AppRuntimeBridge"
    - id: "title-bar"
      type: "TitleBar"
      props:
        visible: true
      builder:
        editable: true
    - id: "shell-column"
      use: "shellColumn"
      children:
        - id: "mission-deck"
          type: "MissionDeck"
          props:
            visible: true
            missionTagLabel: "Mission"
            missionButtonLabel: "Mission"
            vaultButtonLabel: "Vault"
            providerLabelPrefix: "provider"
            approvalsLabel: "approvals"
            traceLabel: "trace"
            opsLabel: "ops"
            recallLabel: "recall"
            snapshotsLabel: "snapshots"
            missionCommand: "view.toggleMission"
            vaultCommand: "view.toggleSessionVault"
          builder:
            editable: true
        - id: "surface-tab-bar"
          type: "SurfaceTabBar"
          props:
            visible: true
          builder:
            editable: true
        - id: "workspace-stage"
          use: "workspaceStage"
          children:
            - id: "sidebar"
              type: "Sidebar"
              props:
                visible: true
                style:
                  display: "flex"
                  flexDirection: "column"
                  height: "100%"
                  minHeight: 0
                  minWidth: 180
                  maxWidth: 520
                  alignSelf: "stretch"
              builder:
                editable: true
            - id: "workspace-frame"
              use: "workspaceFrame"
              children:
                - id: "layout-container"
                  type: "LayoutContainer"
                  props:
                    visible: true
                    style:
                      display: "flex"
                      flexDirection: "column"
                      flex: 1
                      height: "100%"
                      minHeight: 0
                  builder:
                    editable: true
                - id: "search-overlay-mount"
                  type: "ViewMount"
                  props:
                    targetViewId: "search-overlay"
                  builder:
                    editable: true
                - id: "time-travel-slider-mount"
                  type: "ViewMount"
                  props:
                    targetViewId: "time-travel-slider"
                  builder:
                    editable: true
            - id: "web-browser-panel-mount"
              type: "ViewMount"
              props:
                targetViewId: "web-browser-panel"
              builder:
                editable: true
            - id: "agent-chat-panel-mount"
              type: "ViewMount"
              props:
                targetViewId: "agent-chat-panel"
              builder:
                editable: true
        - id: "status-bar"
          type: "StatusBar"
          props:
            visible: true
          builder:
            editable: true
