name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

env:
  NODE_VERSION: '22'
  RUST_VERSION: stable
  TAMUX_LOG: error
  AMUX_LOG: error
  TAMUX_TUI_LOG: error
  AMUX_GATEWAY_LOG: error
  RUST_LOG: error

jobs:
  # ================================================================
  # Linux x64 — Rust cross-compile + Electron packaging
  # ================================================================
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "26.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Rust build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Collect Linux binaries
        run: |
          mkdir -p dist-release/linux
          for bin in tamux-daemon tamux tamux-tui tamux-mcp tamux-gateway; do
            cp target/x86_64-unknown-linux-gnu/release/$bin dist-release/linux/
          done

      - name: Build frontend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm install + build
        run: npm ci && npm run build
        working-directory: frontend

      - name: Copy binaries to frontend/dist
        run: |
          cp dist-release/linux/tamux-daemon frontend/dist/
          cp dist-release/linux/tamux frontend/dist/
          cp dist-release/linux/tamux-tui frontend/dist/
          cp dist-release/linux/tamux-mcp frontend/dist/
          cp dist-release/linux/tamux-gateway frontend/dist/

      - name: Electron package (Linux AppImage + deb)
        run: npx electron-builder --linux AppImage deb
        working-directory: frontend

      - name: Stage bundled skills and guidelines
        run: |
          cp -R skills dist-release/linux/
          cp -R guidelines dist-release/linux/

      - name: Package Linux binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd dist-release/linux
          ZIP="tamux-linux-x86_64.zip"
          zip -r "$ZIP" tamux-daemon tamux tamux-tui tamux-mcp tamux-gateway skills guidelines
          sha256sum "$ZIP" > "SHA256SUMS-linux-x86_64.txt"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            dist-release/linux/*.zip
            dist-release/linux/SHA256SUMS*.txt
            frontend/release/*.AppImage
            frontend/release/*.deb
          retention-days: 5

  # ================================================================
  # Linux arm64 — Rust cross-compile for npm binary distribution
  # ================================================================
  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-unknown-linux-gnu

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "26.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cross
        run: cargo install cross --locked --version 0.2.5

      - name: Rust build
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Collect Linux arm64 binaries
        run: |
          mkdir -p dist-release/linux-arm64
          for bin in tamux-daemon tamux tamux-tui tamux-mcp tamux-gateway; do
            cp target/aarch64-unknown-linux-gnu/release/$bin dist-release/linux-arm64/
          done

      - name: Stage bundled skills and guidelines
        run: |
          cp -R skills dist-release/linux-arm64/
          cp -R guidelines dist-release/linux-arm64/

      - name: Package Linux arm64 binaries
        run: |
          cd dist-release/linux-arm64
          ZIP="tamux-linux-aarch64.zip"
          zip -r "$ZIP" tamux-daemon tamux tamux-tui tamux-mcp tamux-gateway skills guidelines
          sha256sum "$ZIP" > "SHA256SUMS-linux-aarch64.txt"

      - name: Upload Linux arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            dist-release/linux-arm64/*.zip
            dist-release/linux-arm64/SHA256SUMS*.txt
          retention-days: 5

  # ================================================================
  # Windows x64 — Rust cross-compile + Electron packaging
  # ================================================================
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "26.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust build (Windows native)
        shell: pwsh
        run: cargo build --release

      - name: Collect Windows binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-release/windows | Out-Null
          foreach ($bin in "tamux-daemon", "tamux", "tamux-tui", "tamux-mcp", "tamux-gateway") {
            Copy-Item "target/release/$bin.exe" "dist-release/windows/$bin.exe"
          }

      - name: Build frontend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm install + build
        shell: pwsh
        run: |
          npm ci
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build
        working-directory: frontend

      - name: Copy binaries to frontend/dist
        shell: pwsh
        run: |
          Copy-Item dist-release/windows/tamux-daemon.exe frontend/dist/
          Copy-Item dist-release/windows/tamux.exe frontend/dist/
          Copy-Item dist-release/windows/tamux-tui.exe frontend/dist/
          Copy-Item dist-release/windows/tamux-mcp.exe frontend/dist/
          Copy-Item dist-release/windows/tamux-gateway.exe frontend/dist/

      - name: Electron package (Windows portable + nsis)
        shell: pwsh
        run: npx electron-builder --win portable nsis
        working-directory: frontend

      - name: Stage bundled skills and guidelines
        shell: pwsh
        run: |
          Copy-Item -Recurse skills dist-release/windows/
          Copy-Item -Recurse guidelines dist-release/windows/

      - name: Package Windows binaries
        env:
          VERSION: ${{ github.ref_name }}
        shell: pwsh
        working-directory: dist-release/windows
        run: |
          $zip = "tamux-windows-x64.zip"
          Compress-Archive -Path tamux-daemon.exe, tamux.exe, tamux-tui.exe, tamux-mcp.exe, tamux-gateway.exe, skills, guidelines -DestinationPath $zip -Force
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $zip" | Out-File -FilePath SHA256SUMS-windows-x64.txt -Encoding ascii

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            dist-release/windows/*.zip
            dist-release/windows/SHA256SUMS*.txt
            frontend/release/*.exe
          retention-days: 5

  # ================================================================
  # macOS x64 (Intel) — native build
  # ================================================================
  build-darwin-x64:
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-apple-darwin

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "26.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust build
        run: cargo build --release --target x86_64-apple-darwin

      - name: Collect macOS Intel binaries
        run: |
          mkdir -p dist-release/macos
          for bin in tamux-daemon tamux tamux-tui tamux-mcp tamux-gateway; do
            cp target/x86_64-apple-darwin/release/$bin dist-release/macos/
          done

      - name: Build frontend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm install + build
        run: npm ci && npm run build
        working-directory: frontend

      - name: Copy binaries to frontend/dist
        run: |
          cp dist-release/macos/tamux-daemon frontend/dist/
          cp dist-release/macos/tamux frontend/dist/
          cp dist-release/macos/tamux-tui frontend/dist/
          cp dist-release/macos/tamux-mcp frontend/dist/
          cp dist-release/macos/tamux-gateway frontend/dist/

      - name: Electron package (macOS dmg + zip)
        run: npx electron-builder --mac dmg zip
        working-directory: frontend

      - name: Stage bundled skills and guidelines
        run: |
          cp -R skills dist-release/macos/
          cp -R guidelines dist-release/macos/

      - name: Package macOS Intel binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd dist-release/macos
          ZIP="tamux-darwin-x86_64.zip"
          zip -r "$ZIP" tamux-daemon tamux tamux-tui tamux-mcp tamux-gateway skills guidelines
          shasum -a 256 "$ZIP" > "SHA256SUMS-darwin-x86_64.txt"

      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-x64
          path: |
            dist-release/macos/*.zip
            dist-release/macos/SHA256SUMS*.txt
            frontend/release/*.dmg
            frontend/release/*.zip
          retention-days: 5

  # ================================================================
  # macOS arm64 (Apple Silicon) — native build
  # ================================================================
  build-darwin-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-darwin

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "26.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Collect macOS ARM64 binaries
        run: |
          mkdir -p dist-release/macos
          for bin in tamux-daemon tamux tamux-tui tamux-mcp tamux-gateway; do
            cp target/aarch64-apple-darwin/release/$bin dist-release/macos/
          done

      - name: Build frontend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm install + build
        run: npm ci && npm run build
        working-directory: frontend

      - name: Copy binaries to frontend/dist
        run: |
          cp dist-release/macos/tamux-daemon frontend/dist/
          cp dist-release/macos/tamux frontend/dist/
          cp dist-release/macos/tamux-tui frontend/dist/
          cp dist-release/macos/tamux-mcp frontend/dist/
          cp dist-release/macos/tamux-gateway frontend/dist/

      - name: Electron package (macOS dmg + zip)
        run: npx electron-builder --mac dmg zip
        working-directory: frontend

      - name: Stage bundled skills and guidelines
        run: |
          cp -R skills dist-release/macos/
          cp -R guidelines dist-release/macos/

      - name: Package macOS ARM64 binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd dist-release/macos
          ZIP="tamux-darwin-arm64.zip"
          zip -r "$ZIP" tamux-daemon tamux tamux-tui tamux-mcp tamux-gateway skills guidelines
          shasum -a 256 "$ZIP" > "SHA256SUMS-darwin-arm64.txt"

      - name: Upload macOS ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: |
            dist-release/macos/*.zip
            dist-release/macos/SHA256SUMS*.txt
            frontend/release/*.dmg
            frontend/release/*.zip
          retention-days: 5

  # ================================================================
  # Release — collect all artifacts, create GitHub Release
  # ================================================================
  release:
    needs: [build-linux-x64, build-linux-arm64, build-windows-x64, build-darwin-x64, build-darwin-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: false

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create combined SHA256SUMS
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          {
            echo "# SHA256SUMS for tamux v${VERSION}"
            echo ""
          } > SHA256SUMS.txt
          for f in $(find artifacts -name 'SHA256SUMS*.txt' | sort); do
            echo "" >> SHA256SUMS.txt
            echo "### $(basename $(dirname $f))" >> SHA256SUMS.txt
            cat "$f" >> SHA256SUMS.txt
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/SHA256SUMS*.txt
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.dmg
            SHA256SUMS.txt

  # ================================================================
  # Publish npm package via npm trusted publishing (OIDC)
  # ================================================================
  publish-npm:
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package version matches tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./npm-package/package.json').version")
          TAG_VERSION="${TAG_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "npm-package/package.json version $PACKAGE_VERSION does not match tag $TAG_VERSION" >&2
            exit 1
          fi

      - name: Dry-run npm pack
        run: npm pack --dry-run
        working-directory: npm-package

      - name: Publish to npm
        run: npm publish
        working-directory: npm-package
